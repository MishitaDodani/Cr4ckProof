<style>
  @import url("https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600;700&family=Syne:wght@400;700;800&display=swap");

  * {
    box-sizing: border-box;
    margin: 0;
    padding: 0;
  }

  .pw-root {
    font-family: "Syne", sans-serif;
    background: #0b0c10;
    color: #c5c6c7;
    min-height: 100vh;
    padding: 2rem 1.5rem;
    border-radius: 12px;
  }

  .pw-title {
    font-size: 22px;
    font-weight: 800;
    color: #66fcf1;
    letter-spacing: 0.04em;
    text-transform: uppercase;
    margin-bottom: 4px;
  }

  .pw-subtitle {
    font-size: 13px;
    color: #45a29e;
    font-family: "JetBrains Mono", monospace;
    margin-bottom: 2rem;
  }

  .section {
    background: #12151a;
    border: 1px solid #1f2833;
    border-radius: 10px;
    padding: 1.25rem;
    margin-bottom: 1.25rem;
  }

  .section-label {
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: #45a29e;
    margin-bottom: 12px;
  }

  .pw-input-wrap {
    display: flex;
    gap: 8px;
    align-items: center;
  }

  .pw-input {
    flex: 1;
    background: #0b0c10;
    border: 1px solid #1f2833;
    border-radius: 8px;
    padding: 12px 14px;
    font-family: "JetBrains Mono", monospace;
    font-size: 15px;
    color: #66fcf1;
    outline: none;
    transition: border-color 0.2s;
    letter-spacing: 0.05em;
  }

  .pw-input:focus {
    border-color: #66fcf1;
  }
  .pw-input::placeholder {
    color: #2f3640;
  }

  .icon-btn {
    background: #1f2833;
    border: 1px solid #2c3849;
    border-radius: 8px;
    width: 42px;
    height: 42px;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    transition:
      background 0.15s,
      border-color 0.15s;
    flex-shrink: 0;
  }

  .icon-btn:hover {
    background: #2c3849;
    border-color: #45a29e;
  }
  .icon-btn svg {
    width: 18px;
    height: 18px;
    stroke: #66fcf1;
    fill: none;
    stroke-width: 2;
    stroke-linecap: round;
    stroke-linejoin: round;
  }

  .strength-bar-wrap {
    margin-top: 14px;
  }

  .strength-segments {
    display: flex;
    gap: 5px;
    margin-bottom: 8px;
  }

  .seg {
    flex: 1;
    height: 5px;
    background: #1f2833;
    border-radius: 99px;
    transition: background 0.3s ease;
  }

  .seg.active-1 {
    background: #e74c3c;
  }
  .seg.active-2 {
    background: #e67e22;
  }
  .seg.active-3 {
    background: #f1c40f;
  }
  .seg.active-4 {
    background: #2ecc71;
  }
  .seg.active-5 {
    background: #66fcf1;
  }

  .strength-meta {
    display: flex;
    justify-content: space-between;
    align-items: center;
  }

  .strength-label {
    font-size: 13px;
    font-weight: 700;
    letter-spacing: 0.06em;
    text-transform: uppercase;
    font-family: "JetBrains Mono", monospace;
  }

  .entropy-tag {
    font-size: 11px;
    font-family: "JetBrains Mono", monospace;
    color: #45a29e;
    background: #0b0c10;
    border: 1px solid #1f2833;
    padding: 3px 9px;
    border-radius: 20px;
  }

  .checks-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 7px;
  }

  .check-item {
    display: flex;
    align-items: center;
    gap: 8px;
    font-family: "JetBrains Mono", monospace;
    font-size: 12px;
    color: #4b5563;
    transition: color 0.25s;
  }

  .check-item.pass {
    color: #66fcf1;
  }
  .check-item.fail {
    color: #e74c3c;
  }

  .check-dot {
    width: 8px;
    height: 8px;
    border-radius: 50%;
    background: #1f2833;
    flex-shrink: 0;
    transition: background 0.25s;
  }

  .check-item.pass .check-dot {
    background: #66fcf1;
    box-shadow: 0 0 5px #66fcf144;
  }
  .check-item.fail .check-dot {
    background: #e74c3c;
  }

  .crack-time {
    font-family: "JetBrains Mono", monospace;
    font-size: 13px;
    color: #45a29e;
    margin-top: 10px;
    padding: 8px 12px;
    background: #0b0c10;
    border: 1px solid #1f2833;
    border-radius: 7px;
    display: flex;
    justify-content: space-between;
  }

  .crack-time span:last-child {
    color: #66fcf1;
    font-weight: 600;
  }

  .gen-options {
    display: flex;
    flex-direction: column;
    gap: 10px;
  }

  .slider-row {
    display: flex;
    align-items: center;
    gap: 10px;
  }

  .slider-label {
    font-size: 12px;
    color: #45a29e;
    font-family: "JetBrains Mono", monospace;
    min-width: 55px;
  }

  input[type="range"] {
    flex: 1;
    height: 4px;
    background: #1f2833;
    border-radius: 99px;
    outline: none;
  }

  input[type="range"]::-webkit-slider-thumb {
    -webkit-appearance: none;
    width: 16px;
    height: 16px;
    border-radius: 50%;
    background: #66fcf1;
    cursor: pointer;
    box-shadow: 0 0 6px #66fcf166;
  }

  .slider-val {
    font-family: "JetBrains Mono", monospace;
    font-size: 13px;
    color: #66fcf1;
    font-weight: 600;
    min-width: 28px;
    text-align: right;
  }

  .checkbox-row {
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
  }

  .toggle-chip {
    display: flex;
    align-items: center;
    gap: 6px;
    padding: 5px 11px;
    background: #0b0c10;
    border: 1px solid #1f2833;
    border-radius: 20px;
    cursor: pointer;
    font-family: "JetBrains Mono", monospace;
    font-size: 12px;
    color: #4b5563;
    transition: all 0.2s;
    user-select: none;
  }

  .toggle-chip.on {
    border-color: #66fcf1;
    color: #66fcf1;
    background: #0e1c1c;
  }

  .toggle-chip .chip-dot {
    width: 7px;
    height: 7px;
    border-radius: 50%;
    background: #1f2833;
    transition: background 0.2s;
  }

  .toggle-chip.on .chip-dot {
    background: #66fcf1;
  }

  .gen-btn {
    width: 100%;
    padding: 12px;
    background: #66fcf1;
    border: none;
    border-radius: 8px;
    font-family: "Syne", sans-serif;
    font-size: 14px;
    font-weight: 700;
    color: #0b0c10;
    cursor: pointer;
    letter-spacing: 0.06em;
    text-transform: uppercase;
    transition:
      opacity 0.15s,
      transform 0.1s;
    margin-top: 4px;
  }

  .gen-btn:hover {
    opacity: 0.9;
  }
  .gen-btn:active {
    transform: scale(0.98);
  }

  .generated-wrap {
    display: flex;
    gap: 8px;
    align-items: center;
    margin-top: 10px;
  }

  .generated-pw {
    flex: 1;
    font-family: "JetBrains Mono", monospace;
    font-size: 14px;
    color: #66fcf1;
    background: #0b0c10;
    border: 1px solid #1f2833;
    border-radius: 8px;
    padding: 10px 12px;
    word-break: break-all;
    min-height: 42px;
    letter-spacing: 0.03em;
  }

  .copy-feedback {
    font-family: "JetBrains Mono", monospace;
    font-size: 11px;
    color: #66fcf1;
    margin-top: 6px;
    text-align: center;
    height: 16px;
    transition: opacity 0.3s;
  }

  .copy-feedback.hidden {
    opacity: 0;
  }
</style>

<div class="pw-root">
  <h2 class="sr-only">Password strength checker and generator</h2>
  <div class="pw-title">Password Vault</div>
  <div class="pw-subtitle">// strength analyzer + secure generator</div>

  <div class="section">
    <div class="section-label">Analyze Password</div>
    <div class="pw-input-wrap">
      <input
        class="pw-input"
        id="pwInput"
        type="password"
        placeholder="type or paste your password..."
        autocomplete="off"
      />
      <div class="icon-btn" id="toggleVis" title="Show/Hide">
        <svg viewBox="0 0 24 24" id="eyeIcon">
          <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z" />
          <circle cx="12" cy="12" r="3" />
        </svg>
      </div>
      <div class="icon-btn" id="clearBtn" title="Clear">
        <svg viewBox="0 0 24 24">
          <line x1="18" y1="6" x2="6" y2="18" />
          <line x1="6" y1="6" x2="18" y2="18" />
        </svg>
      </div>
    </div>

    <div class="strength-bar-wrap" id="strengthSection" style="display: none">
      <div class="strength-segments">
        <div class="seg" id="s1"></div>
        <div class="seg" id="s2"></div>
        <div class="seg" id="s3"></div>
        <div class="seg" id="s4"></div>
        <div class="seg" id="s5"></div>
      </div>
      <div class="strength-meta">
        <div class="strength-label" id="strengthLabel">—</div>
        <div class="entropy-tag" id="entropyTag">0 bits</div>
      </div>

      <div class="checks-grid" style="margin-top: 14px" id="checksGrid"></div>
      <div class="crack-time" id="crackTime">
        <span>estimated crack time</span>
        <span id="crackVal">—</span>
      </div>
    </div>
  </div>

  <div class="section">
    <div class="section-label">Generate Password</div>
    <div class="gen-options">
      <div class="slider-row">
        <div class="slider-label">Length</div>
        <input
          type="range"
          id="lenSlider"
          min="8"
          max="64"
          value="20"
          step="1"
        />
        <div class="slider-val" id="lenVal">20</div>
      </div>
      <div class="checkbox-row" id="chipsRow">
        <div class="toggle-chip on" data-key="upper">
          <div class="chip-dot"></div>
          A–Z
        </div>
        <div class="toggle-chip on" data-key="lower">
          <div class="chip-dot"></div>
          a–z
        </div>
        <div class="toggle-chip on" data-key="digits">
          <div class="chip-dot"></div>
          0–9
        </div>
        <div class="toggle-chip on" data-key="symbols">
          <div class="chip-dot"></div>
          !@#…
        </div>
        <div class="toggle-chip" data-key="ambiguous">
          <div class="chip-dot"></div>
          no 0OlI
        </div>
      </div>
      <button class="gen-btn" id="genBtn">Generate Secure Password</button>
    </div>
    <div class="generated-wrap" id="genWrap" style="display: none">
      <div class="generated-pw" id="genResult"></div>
      <div class="icon-btn" id="copyBtn" title="Copy">
        <svg viewBox="0 0 24 24">
          <rect x="9" y="9" width="13" height="13" rx="2" ry="2" />
          <path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1" />
        </svg>
      </div>
      <div class="icon-btn" id="useGenBtn" title="Use this password">
        <svg viewBox="0 0 24 24">
          <polyline points="9 11 12 14 22 4" />
          <path d="M21 12v7a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11" />
        </svg>
      </div>
    </div>
    <div class="copy-feedback hidden" id="copyFeedback">
      copied to clipboard!
    </div>
  </div>
</div>

<script>
  const CHECKS = [
    { key: "len8", label: "8+ chars", test: (p) => p.length >= 8 },
    { key: "len12", label: "12+ chars", test: (p) => p.length >= 12 },
    { key: "upper", label: "uppercase", test: (p) => /[A-Z]/.test(p) },
    { key: "lower", label: "lowercase", test: (p) => /[a-z]/.test(p) },
    { key: "digit", label: "numbers", test: (p) => /[0-9]/.test(p) },
    { key: "symbol", label: "symbols", test: (p) => /[^A-Za-z0-9]/.test(p) },
    { key: "norepeat", label: "no repeats", test: (p) => !/(.)\1{2}/.test(p) },
    { key: "len16", label: "16+ chars", test: (p) => p.length >= 16 },
  ];

  function calcEntropy(pw) {
    let pool = 0;
    if (/[a-z]/.test(pw)) pool += 26;
    if (/[A-Z]/.test(pw)) pool += 26;
    if (/[0-9]/.test(pw)) pool += 10;
    if (/[^A-Za-z0-9]/.test(pw)) pool += 32;
    if (pool === 0) return 0;
    return Math.round(pw.length * Math.log2(pool));
  }

  function entropyToStrength(e) {
    if (e < 25) return { level: 1, label: "Very Weak", color: "#e74c3c" };
    if (e < 40) return { level: 2, label: "Weak", color: "#e67e22" };
    if (e < 55) return { level: 3, label: "Fair", color: "#f1c40f" };
    if (e < 70) return { level: 4, label: "Strong", color: "#2ecc71" };
    return { level: 5, label: "Excellent", color: "#66fcf1" };
  }

  function crackTime(entropy) {
    const guesses = Math.pow(2, entropy);
    const gps = 1e10;
    const secs = guesses / gps;
    if (secs < 1) return "instantly";
    if (secs < 60) return Math.round(secs) + " seconds";
    if (secs < 3600) return Math.round(secs / 60) + " minutes";
    if (secs < 86400) return Math.round(secs / 3600) + " hours";
    if (secs < 31536000) return Math.round(secs / 86400) + " days";
    const yrs = secs / 31536000;
    if (yrs < 1e3) return Math.round(yrs) + " years";
    if (yrs < 1e6) return (yrs / 1e3).toFixed(1) + "k years";
    if (yrs < 1e9) return (yrs / 1e6).toFixed(1) + "M years";
    return ">1 billion years";
  }

  function updateStrength(pw) {
    const section = document.getElementById("strengthSection");
    if (!pw) {
      section.style.display = "none";
      return;
    }
    section.style.display = "block";

    const e = calcEntropy(pw);
    const { level, label, color } = entropyToStrength(e);

    for (let i = 1; i <= 5; i++) {
      const seg = document.getElementById("s" + i);
      seg.className = "seg" + (i <= level ? " active-" + level : "");
    }

    document.getElementById("strengthLabel").textContent = label;
    document.getElementById("strengthLabel").style.color = color;
    document.getElementById("entropyTag").textContent = e + " bits";
    document.getElementById("crackVal").textContent = crackTime(e);

    const grid = document.getElementById("checksGrid");
    grid.innerHTML = "";
    CHECKS.forEach((c) => {
      const pass = c.test(pw);
      const div = document.createElement("div");
      div.className = "check-item " + (pass ? "pass" : "fail");
      div.innerHTML = `<div class="check-dot"></div><span>${c.label}</span>`;
      grid.appendChild(div);
    });
  }

  const pwInput = document.getElementById("pwInput");
  pwInput.addEventListener("input", () => updateStrength(pwInput.value));

  document.getElementById("toggleVis").addEventListener("click", () => {
    const isPass = pwInput.type === "password";
    pwInput.type = isPass ? "text" : "password";
    document.getElementById("eyeIcon").innerHTML = isPass
      ? '<line x1="1" y1="1" x2="23" y2="23"/><path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19"/>'
      : '<path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/>';
  });

  document.getElementById("clearBtn").addEventListener("click", () => {
    pwInput.value = "";
    updateStrength("");
  });

  const lenSlider = document.getElementById("lenSlider");
  lenSlider.addEventListener("input", () => {
    document.getElementById("lenVal").textContent = lenSlider.value;
  });

  const chipStates = {
    upper: true,
    lower: true,
    digits: true,
    symbols: true,
    ambiguous: false,
  };
  document.getElementById("chipsRow").addEventListener("click", (e) => {
    const chip = e.target.closest(".toggle-chip");
    if (!chip) return;
    const k = chip.dataset.key;
    chipStates[k] = !chipStates[k];
    chip.classList.toggle("on", chipStates[k]);
  });

  function generatePassword() {
    const len = parseInt(lenSlider.value);
    let charset = "";
    if (chipStates.upper) charset += "ABCDEFGHIJKLMNOPQRSTUVWXYZ";
    if (chipStates.lower) charset += "abcdefghijklmnopqrstuvwxyz";
    if (chipStates.digits) charset += "0123456789";
    if (chipStates.symbols) charset += "!@#$%^&*()-_=+[]{}|;:,.<>?";
    if (chipStates.ambiguous) charset = charset.replace(/[0OlI1]/g, "");
    if (!charset) charset = "abcdefghijklmnopqrstuvwxyz";
    const arr = new Uint32Array(len);
    crypto.getRandomValues(arr);
    return Array.from(arr, (v) => charset[v % charset.length]).join("");
  }

  document.getElementById("genBtn").addEventListener("click", () => {
    const pw = generatePassword();
    document.getElementById("genResult").textContent = pw;
    document.getElementById("genWrap").style.display = "flex";
    document.getElementById("copyFeedback").className = "copy-feedback hidden";
  });

  document.getElementById("copyBtn").addEventListener("click", () => {
    const pw = document.getElementById("genResult").textContent;
    if (!pw) return;
    navigator.clipboard.writeText(pw).then(() => {
      const fb = document.getElementById("copyFeedback");
      fb.className = "copy-feedback";
      setTimeout(() => (fb.className = "copy-feedback hidden"), 2000);
    });
  });

  document.getElementById("useGenBtn").addEventListener("click", () => {
    const pw = document.getElementById("genResult").textContent;
    if (!pw) return;
    pwInput.value = pw;
    pwInput.type = "text";
    updateStrength(pw);
    pwInput.scrollIntoView({ behavior: "smooth" });
  });
</script>
